<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro para Receber Frutas | Fazendinha Turca - Araruama RJ</title>
<meta name="description" content="Cadastre-se para receber as frutas frescas da estação da Fazendinha Turca. Entrega exclusiva em Araruama-RJ.">
<meta name="robots" content="index, follow">

<style>
  :root {
    --cream: #FAF3E6;
    --cream-2: #F1E8D6;
    --green-dark: #1E2E1B;
    --green: #3D5A32;
    --green-light: #7FA35C;
    --brown: #7A5230;
    --brown-dark: #4E3420;
    --terracotta: #C1622D;
    --terracotta-dark: #A24E22;
    --gold: #D9A441;
    --text: #2B2418;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--text);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
  h1,h2,h3 {
    font-family: Georgia, 'Times New Roman', serif;
    margin: 0;
  }
  a { text-decoration: none; }
  img { display: block; max-width: 100%; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: var(--cream);
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-wrap img {
    height: 44px;
    width: 44px;
    border-radius: 50%;
    object-fit: cover;
  }
  .logo-text {
    font-family: Georgia, serif;
    font-weight: 700;
    color: var(--green-dark);
    font-size: 15px;
    line-height: 1.05;
    letter-spacing: 0.5px;
  }
  .voltar-link {
    font-size: 13px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .voltar-link:hover { color: var(--terracotta); }

  /* FORM SECTION */
  .form-wrap {
    max-width: 560px;
    margin: 36px auto 60px;
    padding: 0 16px;
  }
  .form-heading {
    text-align: center;
    margin-bottom: 22px;
  }
  .form-heading h1 {
    font-size: clamp(20px, 3.2vw, 27px);
    color: var(--green-dark);
    margin-bottom: 8px;
  }
  .form-heading p {
    font-size: 13.5px;
    color: #4B4432;
    line-height: 1.5;
    max-width: 460px;
    margin: 0 auto;
  }
  .obs-banner {
    background: rgba(193,98,45,0.13);
    color: var(--terracotta-dark);
    font-size: 12.5px;
    font-weight: 700;
    text-align: center;
    padding: 9px 14px;
    border-radius: 20px;
    margin: 14px auto 0;
    max-width: 340px;
    letter-spacing: 0.2px;
  }
  .card-form {
    background: var(--cream-2);
    border-radius: 16px;
    padding: 26px 24px 28px;
    box-shadow: 0 2px 8px rgba(33,51,31,0.08);
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .field input {
    width: 100%;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1px solid rgba(43,36,24,0.18);
    background: var(--cream);
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(61,90,50,0.15);
  }
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .submit-btn {
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #fff;
    background: var(--green);
    font-size: 14px;
    font-weight: 700;
    padding: 13px 16px;
    border-radius: 24px;
    letter-spacing: 0.5px;
    border: none;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .submit-btn:hover { background: var(--green-dark); transform: translateY(-2px); }
  .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

  .status-msg {
    margin-top: 14px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    border-radius: 10px;
    padding: 10px 12px;
    display: none;
  }
  .status-msg.success {
    display: block;
    background: rgba(61,90,50,0.15);
    color: var(--green-dark);
  }
  .status-msg.error {
    display: block;
    background: rgba(193,98,45,0.15);
    color: var(--terracotta-dark);
  }

  footer {
    background: var(--green-dark);
    color: #EDE7D6;
    padding: 22px 16px;
    text-align: center;
    font-size: 11.5px;
    opacity: 0.9;
  }

  @media (max-width: 480px) {
    .row-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="images/logo.webp" alt="Fazendinha Turca">
    <div class="logo-text">FAZENDINHA<br>TURCA</div>
  </div>
  <a class="voltar-link" href="index.html">&#8592; VOLTAR</a>
</header>

<section class="form-wrap">
  <div class="form-heading">
    <h1>Cadastre-se para Receber as Frutas da Estação &#127807;</h1>
    <p>Preencha seus dados abaixo para receber as frutas frescas da Fazendinha Turca.</p>
    <div class="obs-banner">Obs: Entrega apenas em Araruama.</div>
  </div>

  <form class="card-form" id="cadastroForm">
    <div class="field">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required autocomplete="name">
    </div>

    <div class="field">
      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone" required autocomplete="tel" placeholder="(22) 9XXXX-XXXX">
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>

    <div class="field">
      <label for="rua">Rua</label>
      <input type="text" id="rua" name="rua" required autocomplete="address-line1">
    </div>

    <div class="row-2">
      <div class="field">
        <label for="numero">Número</label>
        <input type="text" id="numero" name="numero" required autocomplete="off">
      </div>
      <div class="field">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro" required autocomplete="address-line2">
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">ENVIAR CADASTRO &#127811;</button>

    <div class="status-msg" id="statusMsg"></div>
  </form>
</section>

<footer>
  Fazendinha Turca &middot; Araruama &ndash; RJ &middot; Entrega de frutas frescas apenas em Araruama
</footer>

<script>
  // ATENÇÃO: substitua a URL abaixo pela URL do seu Google Apps Script
  // publicado como "Web App" (veja instruções enviadas junto com este arquivo).
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVpPbDC7KEwlz6DZkxvA_8y7R2B2aBA3eQYhoM-wc3qZfyJlt3FEctcZQhxAU785aUNw/exec";

  const form = document.getElementById('cadastroForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    statusMsg.className = 'status-msg';
    statusMsg.textContent = '';

    if (SCRIPT_URL.indexOf('COLE_AQUI') !== -1) {
      statusMsg.textContent = 'Configuração pendente: cole a URL do Google Apps Script no arquivo cadastro.html.';
      statusMsg.classList.add('error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'ENVIANDO...';

    const formData = new FormData(form);

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    })
      .then(function () {
        statusMsg.textContent = 'Cadastro enviado com sucesso! Em breve entraremos em contato.';
        statusMsg.classList.add('success');
        form.reset();
      })
      .catch(function () {
        statusMsg.textContent = 'Não foi possível enviar. Tente novamente em instantes.';
        statusMsg.classList.add('error');
      })
      .finally(function () {
        submitBtn.disabled = false;
        submitBtn.textContent = 'ENVIAR CADASTRO \u{1F353}';
      });
  });
</script>

</body>
</html>
